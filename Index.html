<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text-primary: #1c1c1e;
    --text-secondary: #8e8e93;
    --text-tertiary: #aeaeb2;
    --separator: #e5e5ea;
    --blue: #007aff;
    --shadow: 0 2px 20px rgba(0,0,0,0.08);
    --radius: 16px;

    /* Priority colors */
    --p-critical: #ff3b30;
    --p-high: #ff9500;
    --p-medium: #007aff;
    --p-low: #34c759;
    --p-none: #c7c7cc;

    /* Label colors */
    --label-red: #ff3b30;
    --label-orange: #ff9500;
    --label-yellow: #ffcc00;
    --label-green: #34c759;
    --label-teal: #5ac8fa;
    --label-blue: #007aff;
    --label-purple: #af52de;
    --label-pink: #ff2d55;
    --label-gray: #8e8e93;
  }

  body {
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    color: var(--text-primary);
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    padding: 56px 20px 12px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .inbox-icon {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .inbox-icon svg { width: 18px; height: 18px; }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .count-badge {
    font-size: 17px;
    font-weight: 400;
    color: var(--text-tertiary);
  }

  /* Filter bar */
  .filter-bar {
    padding: 4px 20px 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .filter-chip.active {
    background: var(--blue);
    color: white;
  }
  .filter-chip:active { opacity: 0.7; }
  .sort-chip.sort-active {
    background: #34c759;
    color: white;
  }

  /* Task list */
  .task-list {
    margin: 0 16px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    padding: 13px 16px;
    border-bottom: 1px solid var(--separator);
    gap: 12px;
    transition: background 0.1s;
    position: relative;
    cursor: pointer;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:active { background: #f2f2f7; }

  /* Color label strip */
  .color-strip {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 0;
  }
  .task-item.has-color { padding-left: 20px; }

  /* Checkbox */
  .checkbox {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--text-tertiary);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    cursor: pointer;
    background: transparent;
    position: relative;
    overflow: hidden;
  }
  .checkbox.checked {
    border-color: transparent;
    background: var(--text-tertiary);
  }
  .checkbox.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }

  /* Priority ring on checkbox */
  .checkbox.p-critical { border-color: var(--p-critical); }
  .checkbox.p-high { border-color: var(--p-high); }
  .checkbox.p-medium { border-color: var(--p-medium); }
  .checkbox.p-low { border-color: var(--p-low); }

  /* Task content */
  .task-content { flex: 1; min-width: 0; }

  .task-title {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text-primary);
    transition: all 0.3s;
  }
  .task-title.done {
    text-decoration: line-through;
    color: var(--text-tertiary);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .priority-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .priority-tag.critical { background: rgba(255,59,48,0.12); color: var(--p-critical); }
  .priority-tag.high { background: rgba(255,149,0,0.12); color: var(--p-high); }
  .priority-tag.medium { background: rgba(0,122,255,0.12); color: var(--p-medium); }
  .priority-tag.low { background: rgba(52,199,89,0.12); color: var(--p-low); }

  .note-text {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Drag handle */
  .drag-handle {
    width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: grab;
    opacity: 0.3;
    touch-action: none;
    margin-right: -10px;
    margin-left: -4px;
  }
  .drag-handle:active { cursor: grabbing; opacity: 0.7; }
  .drag-handle svg { width: 18px; height: 18px; pointer-events: none; }

  /* Dragging: the actual row becomes the card */
  .task-item.dragging {
    background: #eef2ff;
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.16), 0 2px 6px rgba(0,0,0,0.08);
    position: relative;
    z-index: 50;
    border-bottom: 1px solid transparent !important;
  }

  /* Siblings animate smoothly out of the way */
  .task-item.shifting {
    transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* List switcher */
  .list-switcher {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 4px 8px 4px 0;
    border-radius: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .list-switcher:active { opacity: 0.7; }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--separator);
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:active { background: var(--bg); }
  .dropdown-item.active-list { color: var(--blue); }
  .dropdown-item .list-dot {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .dropdown-item .list-dot svg { width: 15px; height: 15px; }
  .dropdown-list-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dropdown-item .list-task-count {
    font-size: 14px;
    color: var(--text-tertiary);
    font-weight: 400;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .delete-list-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(255,59,48,0.1);
    color: var(--p-critical);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .delete-list-btn:active { background: rgba(255,59,48,0.22); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 32px;
    right: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,122,255,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(0,122,255,0.3); }
  .fab svg { width: 24px; height: 24px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    width: 100%;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 40px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 92dvh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--separator);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: block;
  }

  .form-input {
    width: 100%;
    font-size: 17px;
    font-family: inherit;
    border: none;
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 20px;
    resize: none;
    min-height: 44px;
  }
  .form-input::placeholder { color: var(--text-tertiary); }

  /* Priority selector */
  .priority-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .priority-btn {
    padding: 10px 4px;
    border: 2px solid var(--separator);
    border-radius: 10px;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text-secondary);
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .priority-btn .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .priority-btn.sel-critical { border-color: var(--p-critical); color: var(--p-critical); background: rgba(255,59,48,0.06); }
  .priority-btn.sel-high { border-color: var(--p-high); color: var(--p-high); background: rgba(255,149,0,0.06); }
  .priority-btn.sel-medium { border-color: var(--p-medium); color: var(--p-medium); background: rgba(0,122,255,0.06); }
  .priority-btn.sel-low { border-color: var(--p-low); color: var(--p-low); background: rgba(52,199,89,0.06); }

  /* Color picker */
  .color-picker {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .color-dot-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .color-dot-btn:active { transform: scale(0.88); }
  .color-dot-btn.selected { border-color: rgba(0,0,0,0.2); transform: scale(1.15); }
  .color-dot-btn.no-color {
    background: var(--bg);
    border-color: var(--separator) !important;
    color: var(--text-tertiary);
    font-size: 16px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
  }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--bg);
    font-size: 17px;
    font-family: inherit;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
  }
  .btn-save {
    flex: 2;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--blue);
    font-size: 17px;
    font-family: inherit;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:active { opacity: 0.8; }

  /* Context menu */
  .context-menu {
    position: fixed;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 300;
    overflow: hidden;
    min-width: 180px;
    display: none;
  }
  .context-menu.open { display: block; animation: popIn 0.15s ease; }
  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .context-item {
    padding: 13px 16px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--separator);
    color: var(--text-primary);
  }
  .context-item:last-child { border-bottom: none; }
  .context-item:active { background: var(--bg); }
  .context-item.danger { color: var(--p-critical); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-tertiary);
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Section headers for grouped view */
  .section-header {
    padding: 20px 20px 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Completed section */
  .completed-toggle {
    margin: 20px 16px 0;
    padding: 12px 16px;
    background: var(--card);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  .completed-toggle span {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .completed-toggle .chev {
    width: 20px; height: 20px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
  }
  .completed-toggle.expanded .chev { transform: rotate(90deg); }

  #completed-section { margin-top: 4px; }
  #completed-section .task-item .task-title { color: var(--text-tertiary); text-decoration: line-through; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="list-switcher" id="list-switcher">
      <div class="inbox-icon" id="list-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
          <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
        </svg>
      </div>
      <h1 id="list-title">Inbox</h1>
      <svg id="list-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;color:var(--text-secondary);margin-left:2px;transition:transform 0.2s;flex-shrink:0">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="add-list-btn" style="width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2.5" stroke-linecap="round" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <span class="count-badge" id="count-badge">0</span>
  </div>
</div>

<!-- List dropdown -->
<div id="list-dropdown" style="display:none;position:absolute;top:110px;left:16px;right:16px;background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.14);z-index:150;overflow:hidden;">
  <div id="list-dropdown-items"></div>
</div>

<!-- Delete list confirmation -->
<div class="modal-overlay" id="delete-list-overlay">
  <div class="modal" style="padding-bottom:32px">
    <div class="modal-handle"></div>
    <div style="text-align:center;padding:8px 0 20px">
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Delete List</div>
      <div style="font-size:15px;color:var(--text-secondary);line-height:1.4" id="delete-list-msg">This will permanently delete this list and all its tasks.</div>
    </div>
    <button id="confirm-delete-list-btn" style="width:100%;padding:15px;border:none;border-radius:12px;background:var(--p-critical);color:white;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:12px">Delete</button>
    <button id="cancel-delete-list-btn" style="width:100%;padding:15px;border:none;border-radius:12px;background:var(--bg);color:var(--text-primary);font-size:17px;font-weight:500;font-family:inherit;cursor:pointer">Cancel</button>
  </div>
</div>

<!-- New list modal -->
<div class="modal-overlay" id="new-list-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New List</div>
    <label class="form-label">List Name</label>
    <input type="text" class="form-input" id="new-list-input" placeholder="e.g. Work, Shopping…" style="min-height:44px">
    <label class="form-label">Color</label>
    <div class="color-picker" id="list-color-picker">
      <button class="color-dot-btn selected" data-lcolor="#007aff" style="background:#007aff"></button>
      <button class="color-dot-btn" data-lcolor="#ff3b30" style="background:#ff3b30"></button>
      <button class="color-dot-btn" data-lcolor="#ff9500" style="background:#ff9500"></button>
      <button class="color-dot-btn" data-lcolor="#34c759" style="background:#34c759"></button>
      <button class="color-dot-btn" data-lcolor="#af52de" style="background:#af52de"></button>
      <button class="color-dot-btn" data-lcolor="#ff2d55" style="background:#ff2d55"></button>
      <button class="color-dot-btn" data-lcolor="#5ac8fa" style="background:#5ac8fa"></button>
      <button class="color-dot-btn" data-lcolor="#ffcc00" style="background:#ffcc00"></button>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" id="cancel-new-list">Cancel</button>
      <button class="btn-save" id="save-new-list">Create List</button>
    </div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active" data-filter="all">All</button>
  <button class="filter-chip" data-filter="critical">🔴 Critical</button>
  <button class="filter-chip" data-filter="high">🟠 High</button>
  <button class="filter-chip" data-filter="medium">🔵 Medium</button>
  <button class="filter-chip" data-filter="low">🟢 Low</button>
  <button class="filter-chip sort-chip sort-active" id="sort-btn" data-sort="priority">↕ Priority</button>
</div>

<div id="task-container"></div>

<div class="completed-toggle" id="completed-toggle" style="display:none">
  <span id="completed-label">Completed (0)</span>
  <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
</div>
<div id="completed-section" style="display:none"></div>

<button class="fab" id="fab-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">New Task</div>

    <label class="form-label">Task</label>
    <textarea class="form-input" id="task-input" rows="2" placeholder="What needs to be done?"></textarea>

    <label class="form-label">Note (optional)</label>
    <textarea class="form-input" id="note-input" rows="2" placeholder="Add a note…"></textarea>

    <label class="form-label">Priority</label>
    <div class="priority-selector">
      <button class="priority-btn" data-p="critical">
        <span class="dot" style="background:var(--p-critical)"></span>Critical
      </button>
      <button class="priority-btn" data-p="high">
        <span class="dot" style="background:var(--p-high)"></span>High
      </button>
      <button class="priority-btn" data-p="medium">
        <span class="dot" style="background:var(--p-medium)"></span>Medium
      </button>
      <button class="priority-btn" data-p="low">
        <span class="dot" style="background:var(--p-low)"></span>Low
      </button>
    </div>

    <label class="form-label">Color Label</label>
    <div class="color-picker" id="color-picker">
      <button class="color-dot-btn no-color selected" data-color="">✕</button>
      <button class="color-dot-btn" data-color="red" style="background:var(--label-red)"></button>
      <button class="color-dot-btn" data-color="orange" style="background:var(--label-orange)"></button>
      <button class="color-dot-btn" data-color="yellow" style="background:var(--label-yellow)"></button>
      <button class="color-dot-btn" data-color="green" style="background:var(--label-green)"></button>
      <button class="color-dot-btn" data-color="teal" style="background:var(--label-teal)"></button>
      <button class="color-dot-btn" data-color="blue" style="background:var(--label-blue)"></button>
      <button class="color-dot-btn" data-color="purple" style="background:var(--label-purple)"></button>
      <button class="color-dot-btn" data-color="pink" style="background:var(--label-pink)"></button>
      <button class="color-dot-btn" data-color="gray" style="background:var(--label-gray)"></button>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save Task</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="context-menu" id="context-menu">
  <div class="context-item" id="ctx-edit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </div>
  <div class="context-item danger" id="ctx-delete">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Delete
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgwgHuaJBnpCFuhtmV32EY7lXBCs24pY4",
  authDomain: "test-5b5df.firebaseapp.com",
  projectId: "test-5b5df",
  storageBucket: "test-5b5df.firebasestorage.app",
  messagingSenderId: "793772828615",
  appId: "1:793772828615:web:19d21d7143e246e7625be2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DATA_DOC = doc(db, 'inbox', 'data');

const COLOR_MAP = {
  red: '#ff3b30', orange: '#ff9500', yellow: '#ffcc00', green: '#34c759',
  teal: '#5ac8fa', blue: '#007aff', purple: '#af52de', pink: '#ff2d55', gray: '#8e8e93'
};
const PRIORITY_COLOR_MAP = { critical: '#ff3b30', high: '#ff9500', medium: '#007aff', low: '#34c759' };

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

let lists = [];
let tasks = [];
let activeListId = 'inbox';
let activeFilter = 'all';
let sortMode = 'priority';
let editingId = null;
let selectedPriority = '';
let selectedColor = '';
let contextTaskId = null;
let longPressTimer = null;
let listDropdownOpen = false;
let selectedListColor = '#007aff';
let pendingDeleteListId = null;
let manualOrderLists = new Set();
let isSaving = false;
let saveQueued = false;

// ── FIREBASE SAVE/LOAD ────────────────────────────────────────────
async function saveToFirebase() {
  if (isSaving) { saveQueued = true; return; }
  isSaving = true;
  try {
    await setDoc(DATA_DOC, {
      lists,
      tasks,
      manualOrderLists: [...manualOrderLists],
      updatedAt: Date.now()
    });
  } catch(e) {
    console.error('Save failed:', e);
  }
  isSaving = false;
  if (saveQueued) { saveQueued = false; saveToFirebase(); }
}

function save() {
  // Also keep localStorage as offline backup
  localStorage.setItem('lists-v2', JSON.stringify(lists));
  localStorage.setItem('tasks-v2', JSON.stringify(tasks));
  saveToFirebase();
}

function getDefaultData() {
  return {
    lists: [{ id: 'inbox', name: 'Inbox', color: '#007aff' }],
    tasks: [
      { id: genId(), listId: 'inbox', title: 'Item 1', note: '', priority: 'critical', color: '', done: false },
      { id: genId(), listId: 'inbox', title: 'Item 2', note: '', priority: 'high', color: '', done: false },
      { id: genId(), listId: 'inbox', title: 'Item 3', note: '', priority: 'medium', color: '', done: false },
      { id: genId(), listId: 'inbox', title: 'Item 4', note: '', priority: 'low', color: '', done: false },
    ],
    manualOrderLists: []
  };
}

// Show loading state
document.getElementById('task-container').innerHTML = '<div style="text-align:center;padding:48px 20px;color:#8e8e93;font-size:15px">Loading...</div>';

// Load from Firebase, fall back to localStorage
async function initData() {
  try {
    const snap = await getDoc(DATA_DOC);
    if (snap.exists()) {
      const d = snap.data();
      lists = d.lists || [];
      tasks = d.tasks || [];
      manualOrderLists = new Set(d.manualOrderLists || []);
    } else {
      // First time — check localStorage for migration
      const oldLists = JSON.parse(localStorage.getItem('lists-v2') || 'null');
      const oldTasks = JSON.parse(localStorage.getItem('tasks-v2') || 'null');
      const veryOldTasks = JSON.parse(localStorage.getItem('inbox-tasks') || 'null');

      if (oldLists && oldTasks && oldTasks.length > 0) {
        lists = oldLists;
        tasks = oldTasks;
      } else if (veryOldTasks && veryOldTasks.length > 0) {
        lists = [{ id: 'inbox', name: 'Inbox', color: '#007aff' }];
        tasks = veryOldTasks.map(t => ({ ...t, listId: 'inbox' }));
      } else {
        const d = getDefaultData();
        lists = d.lists; tasks = d.tasks;
      }
      // Save to Firebase immediately
      await setDoc(DATA_DOC, { lists, tasks, manualOrderLists: [], updatedAt: Date.now() });
    }
  } catch(e) {
    console.error('Load failed, falling back to localStorage', e);
    lists = JSON.parse(localStorage.getItem('lists-v2') || 'null') || [{ id: 'inbox', name: 'Inbox', color: '#007aff' }];
    tasks = JSON.parse(localStorage.getItem('tasks-v2') || '[]');
  }

  activeListId = lists[0]?.id || 'inbox';
  renderAll();

  // Listen for real-time updates from other devices
  onSnapshot(DATA_DOC, (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    // Only update if it's newer and we're not mid-save
    if (d.updatedAt && d.updatedAt > (window._lastSaveTime || 0) && !isSaving) {
      lists = d.lists || [];
      tasks = d.tasks || [];
      manualOrderLists = new Set(d.manualOrderLists || []);
      renderAll();
    }
  });
}

// ── RENDER ────────────────────────────────────────────────────────
function getActiveList() { return lists.find(l => l.id === activeListId) || lists[0]; }

function renderAll() {
  const list = getActiveList();
  if (!list) return;

  document.getElementById('list-title').textContent = list.name;
  document.getElementById('list-icon').style.background = list.color;

  const allIncomplete = tasks.filter(t => t.listId === activeListId && !t.done);
  const complete = tasks.filter(t => t.listId === activeListId && t.done);

  let filtered = allIncomplete;
  if (activeFilter !== 'all') filtered = allIncomplete.filter(t => t.priority === activeFilter);
  if (sortMode === 'priority' || activeFilter !== 'all') {
    const pOrder = { critical: 0, high: 1, medium: 2, low: 3, '': 4 };
    filtered = [...filtered].sort((a, b) => (pOrder[a.priority||''] ?? 4) - (pOrder[b.priority||''] ?? 4));
  }

  const container = document.getElementById('task-container');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="task-list" style="margin:0 16px"><div class="empty-state"><div class="big">&#10003;</div><p>' + (activeFilter !== 'all' ? 'No tasks with this priority' : 'This list is empty') + '</p></div></div>';
  } else {
    container.innerHTML = '<div class="task-list" id="main-list">' + filtered.map(t => renderTask(t)).join('') + '</div>';
    attachTaskEvents(document.getElementById('main-list'));
  }

  document.getElementById('count-badge').textContent = allIncomplete.length || '';

  const toggle = document.getElementById('completed-toggle');
  const section = document.getElementById('completed-section');
  if (complete.length > 0) {
    toggle.style.display = 'flex';
    document.getElementById('completed-label').textContent = 'Completed (' + complete.length + ')';
    if (toggle.classList.contains('expanded')) {
      section.style.display = 'block';
      section.innerHTML = '<div class="task-list" style="margin:4px 16px 0">' + complete.map(t => renderTask(t)).join('') + '</div>';
      attachTaskEvents(section);
    }
  } else {
    toggle.style.display = 'none';
    section.style.display = 'none';
  }

  // Update sort button
  const sortBtn = document.getElementById('sort-btn');
  if (sortBtn) {
    if (sortMode === 'priority') { sortBtn.textContent = '↕ Priority'; sortBtn.classList.add('sort-active'); }
    else { sortBtn.textContent = '↕ Sort'; sortBtn.classList.remove('sort-active'); }
  }
}

function renderTask(t) {
  const stripColor = t.color ? COLOR_MAP[t.color] : (t.priority ? PRIORITY_COLOR_MAP[t.priority] : '');
  const colorStyle = stripColor ? ('style="background:' + stripColor + '"') : '';
  const hasColor = stripColor ? 'has-color' : '';
  const pClass = t.priority ? ('p-' + t.priority) : '';
  const doneClass = t.done ? 'checked' : '';
  let meta = '';
  if (t.priority) meta += '<span class="priority-tag ' + t.priority + '">' + t.priority + '</span>';
  if (t.note) meta += '<span class="note-text">' + escHtml(t.note) + '</span>';

  return '<div class="task-item ' + hasColor + '" data-id="' + t.id + '">'
    + (stripColor ? '<div class="color-strip" ' + colorStyle + '></div>' : '')
    + '<div class="checkbox ' + pClass + ' ' + doneClass + '" data-check="' + t.id + '"></div>'
    + '<div class="task-content">'
    + '<div class="task-title' + (t.done ? ' done' : '') + '">' + escHtml(t.title) + '</div>'
    + (meta ? '<div class="task-meta">' + meta + '</div>' : '')
    + '</div>'
    + '<div class="drag-handle" data-drag="' + t.id + '">'
    + '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="5.5" cy="4" r="1.3"/><circle cx="10.5" cy="4" r="1.3"/><circle cx="5.5" cy="8" r="1.3"/><circle cx="10.5" cy="8" r="1.3"/><circle cx="5.5" cy="12" r="1.3"/><circle cx="10.5" cy="12" r="1.3"/></svg>'
    + '</div>'
    + '</div>';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── LIST DROPDOWN ─────────────────────────────────────────────────
function toggleDropdown() {
  listDropdownOpen = !listDropdownOpen;
  const dd = document.getElementById('list-dropdown');
  const chev = document.getElementById('list-chevron');
  if (listDropdownOpen) { renderDropdown(); dd.style.display = 'block'; chev.style.transform = 'rotate(180deg)'; }
  else { dd.style.display = 'none'; chev.style.transform = ''; }
}

function closeDropdown() {
  if (!listDropdownOpen) return;
  listDropdownOpen = false;
  document.getElementById('list-dropdown').style.display = 'none';
  document.getElementById('list-chevron').style.transform = '';
}

function renderDropdown() {
  const container = document.getElementById('list-dropdown-items');
  container.innerHTML = lists.map(l => {
    const count = tasks.filter(t => t.listId === l.id && !t.done).length;
    const isActive = l.id === activeListId;
    const canDelete = l.id !== 'inbox';
    return '<div class="dropdown-item' + (isActive ? ' active-list' : '') + '" data-lid="' + l.id + '">'
      + '<div class="list-dot" style="background:' + l.color + '20">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="' + l.color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>'
      + '</div>'
      + '<span class="dropdown-list-name">' + escHtml(l.name) + '</span>'
      + '<span class="list-task-count">' + (count || '') + '</span>'
      + (canDelete
          ? '<button class="delete-list-btn" data-delete="' + l.id + '">'
            + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:15px;height:15px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'
            + '</button>'
          : '<span style="width:28px;flex-shrink:0"></span>')
      + '</div>';
  }).join('');

  container.querySelectorAll('.dropdown-item[data-lid]').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('.delete-list-btn')) return;
      activeListId = item.dataset.lid;
      closeDropdown();
      activeFilter = 'all';
      sortMode = manualOrderLists.has(item.dataset.lid) ? 'manual' : 'priority';
      document.querySelectorAll('.filter-chip:not(.sort-chip)').forEach(c => c.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      renderAll();
    });
  });

  container.querySelectorAll('.delete-list-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); showDeleteList(btn.dataset.delete); });
  });
}

function showDeleteList(lid) {
  const l = lists.find(x => x.id === lid);
  if (!l) return;
  pendingDeleteListId = lid;
  document.getElementById('delete-list-msg').textContent = 'Delete "' + l.name + '" and all its tasks? This cannot be undone.';
  document.getElementById('delete-list-overlay').classList.add('open');
}

// ── NEW LIST ──────────────────────────────────────────────────────
function openNewListModal() {
  closeDropdown();
  selectedListColor = '#007aff';
  document.getElementById('new-list-input').value = '';
  updateListColorUI();
  document.getElementById('new-list-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-list-input').focus(), 300);
}

function updateListColorUI() {
  document.querySelectorAll('[data-lcolor]').forEach(b => b.classList.toggle('selected', b.dataset.lcolor === selectedListColor));
}

function saveNewList() {
  const name = document.getElementById('new-list-input').value.trim();
  if (!name) { document.getElementById('new-list-input').focus(); return; }
  const newList = { id: genId(), name, color: selectedListColor };
  lists.push(newList);
  save();
  activeListId = newList.id;
  document.getElementById('new-list-overlay').classList.remove('open');
  renderAll();
}

// ── TASK EVENTS ───────────────────────────────────────────────────
function attachTaskEvents(container) {
  container.querySelectorAll('[data-check]').forEach(cb => {
    cb.addEventListener('click', e => {
      e.stopPropagation();
      const t = tasks.find(x => x.id === cb.dataset.check);
      if (t) { t.done = !t.done; save(); renderAll(); }
    });
  });

  container.querySelectorAll('.task-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('[data-check]')) return;
      if (e.target.closest('[data-drag]')) return;
      if (isDragging) return;
      openEditModal(item.dataset.id);
    });
    item.addEventListener('contextmenu', e => { e.preventDefault(); showContextMenu(e, item.dataset.id); });
    item.addEventListener('touchstart', e => {
      if (e.target.closest('[data-drag]')) return;
      longPressTimer = setTimeout(() => showContextMenu(e.touches[0], item.dataset.id), 600);
    }, { passive: true });
    item.addEventListener('touchend', () => clearTimeout(longPressTimer));
    item.addEventListener('touchmove', () => clearTimeout(longPressTimer));
  });

  container.querySelectorAll('[data-drag]').forEach(handle => {
    handle.addEventListener('mousedown', e => { e.preventDefault(); startDrag(e.clientX, e.clientY, handle.dataset.drag); });
    handle.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      startDrag(e.touches[0].clientX, e.touches[0].clientY, handle.dataset.drag);
    }, { passive: false });
  });
}

// ── DRAG & DROP ───────────────────────────────────────────────────
let isDragging = false;
let dragId = null;
let dragEl = null;
let dragStartY = 0;
let dragCurrentY = 0;
let dragOffsetY = 0;
let itemHeights = [];
let itemTops = [];
let currentDropIndex = -1;
let originalIndex = -1;

function startDrag(clientX, clientY, id) {
  if (activeFilter !== 'all') return;
  const list = document.getElementById('main-list');
  if (!list) return;
  const el = list.querySelector('[data-id="' + id + '"]');
  if (!el) return;

  isDragging = true; dragId = id; dragEl = el;
  const rect = el.getBoundingClientRect();
  dragOffsetY = clientY - rect.top;
  dragStartY = clientY; dragCurrentY = clientY;

  const allItems = [...list.querySelectorAll('.task-item')];
  originalIndex = allItems.indexOf(el);
  currentDropIndex = originalIndex;
  itemHeights = allItems.map(i => i.getBoundingClientRect().height);
  itemTops = allItems.map(i => i.getBoundingClientRect().top);

  allItems.forEach(item => { if (item !== el) { item.classList.add('shifting'); item.style.transform = ''; } });
  el.classList.add('dragging');
  el.style.transition = 'none';
  el.style.transform = 'translateY(0px)';
  el.style.zIndex = '50';

  document.body.style.overflow = 'hidden';
  document.body.style.touchAction = 'none';
  if (navigator.vibrate) navigator.vibrate(12);

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMoveTouch, { passive: false });
  document.addEventListener('touchend', onDragEnd);
  document.addEventListener('touchcancel', onDragEnd);
}

function onDragMoveTouch(e) {
  if (!isDragging) return;
  e.preventDefault(); e.stopPropagation();
  onDragMove({ clientY: e.touches[0].clientY });
}

function onDragMove(e) {
  if (!isDragging || !dragEl) return;
  dragCurrentY = e.clientY;
  const deltaY = dragCurrentY - dragStartY;
  dragEl.style.transform = 'translateY(' + deltaY + 'px)';

  const draggedCenter = itemTops[originalIndex] + dragOffsetY + deltaY;
  const list = document.getElementById('main-list');
  if (!list) return;
  const allItems = [...list.querySelectorAll('.task-item')];
  const dragHeight = itemHeights[originalIndex];
  let newDropIndex = originalIndex;

  for (let i = 0; i < allItems.length; i++) {
    if (allItems[i] === dragEl) continue;
    const mid = itemTops[i] + itemHeights[i] / 2;
    if (i < originalIndex && draggedCenter < mid) { newDropIndex = i; break; }
    if (i > originalIndex && draggedCenter + dragHeight > mid) newDropIndex = i;
  }

  if (newDropIndex === currentDropIndex) return;
  currentDropIndex = newDropIndex;

  allItems.forEach((item, i) => {
    if (item === dragEl) return;
    let shift = 0;
    if (originalIndex < currentDropIndex && i > originalIndex && i <= currentDropIndex) shift = -dragHeight;
    else if (originalIndex > currentDropIndex && i >= currentDropIndex && i < originalIndex) shift = dragHeight;
    item.style.transform = 'translateY(' + shift + 'px)';
  });
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMoveTouch);
  document.removeEventListener('touchend', onDragEnd);
  document.removeEventListener('touchcancel', onDragEnd);
  document.body.style.overflow = '';
  document.body.style.touchAction = '';

  const list = document.getElementById('main-list');
  const allItems = list ? [...list.querySelectorAll('.task-item')] : [];

  let finalY = 0;
  if (currentDropIndex > originalIndex) {
    for (let i = originalIndex + 1; i <= currentDropIndex; i++) finalY += itemHeights[i];
  } else {
    for (let i = currentDropIndex; i < originalIndex; i++) finalY -= itemHeights[i];
  }

  if (dragEl) { dragEl.style.transition = 'transform 0.15s cubic-bezier(0.25,0.46,0.45,0.94)'; dragEl.style.transform = 'translateY(' + finalY + 'px)'; }
  allItems.forEach(item => { if (item !== dragEl) item.style.transition = 'transform 0.15s cubic-bezier(0.25,0.46,0.45,0.94)'; });

  setTimeout(() => {
    allItems.forEach(item => { item.classList.remove('dragging','shifting'); item.style.transform=''; item.style.transition=''; item.style.zIndex=''; });
    if (currentDropIndex !== originalIndex) {
      const complete = tasks.filter(t => t.done || t.listId !== activeListId);
      const incomplete = tasks.filter(t => t.listId === activeListId && !t.done);
      const domIds = allItems.map(el => el.dataset.id);
      const ordered = domIds.map(id => incomplete.find(t => t.id === id)).filter(Boolean);
      const [moved] = ordered.splice(originalIndex, 1);
      ordered.splice(currentDropIndex, 0, moved);
      tasks = [...ordered, ...complete];
      save();
      manualOrderLists.add(activeListId);
      sortMode = 'manual';
    }
    renderAll();
    dragId = null; dragEl = null; currentDropIndex = -1; originalIndex = -1;
  }, 160);
}

// ── MODALS ────────────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('task-input').value = '';
  document.getElementById('note-input').value = '';
  selectedPriority = ''; selectedColor = '';
  updatePriorityUI(); updateColorUI();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('task-input').focus(), 300);
}

function openEditModal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('task-input').value = t.title;
  document.getElementById('note-input').value = t.note || '';
  selectedPriority = t.priority || ''; selectedColor = t.color || '';
  updatePriorityUI(); updateColorUI();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId = null; }

function saveTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) { document.getElementById('task-input').focus(); return; }
  const note = document.getElementById('note-input').value.trim();
  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    if (t) { t.title = title; t.note = note; t.priority = selectedPriority; t.color = selectedColor; }
  } else {
    tasks.unshift({ id: genId(), listId: activeListId, title, note, priority: selectedPriority, color: selectedColor, done: false });
  }
  save(); renderAll(); closeModal();
}

function updatePriorityUI() {
  document.querySelectorAll('.priority-btn').forEach(btn => {
    btn.className = 'priority-btn' + (selectedPriority === btn.dataset.p ? (' sel-' + btn.dataset.p) : '');
  });
}
function updateColorUI() {
  document.querySelectorAll('.color-dot-btn').forEach(btn => btn.classList.toggle('selected', btn.dataset.color === selectedColor));
}

// ── CONTEXT MENU ──────────────────────────────────────────────────
function showContextMenu(e, id) {
  contextTaskId = id;
  const menu = document.getElementById('context-menu');
  menu.classList.add('open');
  const x = Math.min((e.clientX || e.pageX), window.innerWidth - 200);
  const y = Math.min((e.clientY || e.pageY), window.innerHeight - 100);
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
}
function hideContextMenu() { document.getElementById('context-menu').classList.remove('open'); contextTaskId = null; }

// ── WIRE UP ───────────────────────────────────────────────────────
document.getElementById('list-switcher').addEventListener('click', toggleDropdown);
document.getElementById('add-list-btn').addEventListener('click', openNewListModal);
document.getElementById('fab-btn').addEventListener('click', openAddModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveTask);
document.getElementById('cancel-new-list').addEventListener('click', () => document.getElementById('new-list-overlay').classList.remove('open'));
document.getElementById('save-new-list').addEventListener('click', saveNewList);
document.getElementById('new-list-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveNewList(); });

document.querySelectorAll('[data-lcolor]').forEach(btn => {
  btn.addEventListener('click', () => { selectedListColor = btn.dataset.lcolor; updateListColorUI(); });
});

document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.getElementById('new-list-overlay').addEventListener('click', e => { if (e.target === document.getElementById('new-list-overlay')) document.getElementById('new-list-overlay').classList.remove('open'); });

document.querySelectorAll('.priority-btn').forEach(btn => {
  btn.addEventListener('click', () => { selectedPriority = selectedPriority === btn.dataset.p ? '' : btn.dataset.p; updatePriorityUI(); });
});
document.querySelectorAll('.color-dot-btn').forEach(btn => {
  btn.addEventListener('click', () => { selectedColor = btn.dataset.color; updateColorUI(); });
});

document.querySelectorAll('.filter-chip:not(.sort-chip)').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip:not(.sort-chip)').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    renderAll();
  });
});

document.getElementById('sort-btn').addEventListener('click', () => {
  const btn = document.getElementById('sort-btn');
  if (sortMode === 'manual') {
    sortMode = 'priority'; btn.textContent = '↕ Priority'; btn.classList.add('sort-active');
  } else {
    sortMode = 'manual'; btn.textContent = '↕ Sort'; btn.classList.remove('sort-active');
    manualOrderLists.add(activeListId);
  }
  renderAll();
});

document.getElementById('ctx-edit').addEventListener('click', () => { const id = contextTaskId; hideContextMenu(); openEditModal(id); });
document.getElementById('ctx-delete').addEventListener('click', () => { tasks = tasks.filter(t => t.id !== contextTaskId); save(); renderAll(); hideContextMenu(); });
document.addEventListener('click', e => {
  if (!e.target.closest('#context-menu')) hideContextMenu();
  if (!e.target.closest('#list-dropdown') && !e.target.closest('#list-switcher') && !e.target.closest('#add-list-btn')) closeDropdown();
});

document.getElementById('completed-toggle').addEventListener('click', function() {
  this.classList.toggle('expanded');
  const section = document.getElementById('completed-section');
  if (this.classList.contains('expanded')) {
    section.style.display = 'block';
    const complete = tasks.filter(t => t.listId === activeListId && t.done);
    section.innerHTML = '<div class="task-list" style="margin:4px 16px 0">' + complete.map(t => renderTask(t)).join('') + '</div>';
    attachTaskEvents(section);
  } else { section.style.display = 'none'; }
});

document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveTask(); } });

document.getElementById('confirm-delete-list-btn').addEventListener('click', () => {
  if (!pendingDeleteListId) return;
  tasks = tasks.filter(t => t.listId !== pendingDeleteListId);
  lists = lists.filter(x => x.id !== pendingDeleteListId);
  if (activeListId === pendingDeleteListId) activeListId = lists[0].id;
  save();
  pendingDeleteListId = null;
  document.getElementById('delete-list-overlay').classList.remove('open');
  closeDropdown();
  renderAll();
});

document.getElementById('cancel-delete-list-btn').addEventListener('click', () => {
  pendingDeleteListId = null;
  document.getElementById('delete-list-overlay').classList.remove('open');
});

document.getElementById('delete-list-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('delete-list-overlay')) {
    pendingDeleteListId = null;
    document.getElementById('delete-list-overlay').classList.remove('open');
  }
});

// Start
initData();
</script>

        if (newWorker.state === 'activated') {
          // New version installed — reload to get fresh app
          window.location.reload();
        }
      });
    });
  });
}
