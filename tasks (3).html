<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text-primary: #1c1c1e;
    --text-secondary: #8e8e93;
    --text-tertiary: #aeaeb2;
    --separator: #e5e5ea;
    --blue: #007aff;
    --shadow: 0 2px 20px rgba(0,0,0,0.08);
    --radius: 16px;

    /* Priority colors */
    --p-critical: #ff3b30;
    --p-high: #ff9500;
    --p-medium: #007aff;
    --p-low: #34c759;
    --p-none: #c7c7cc;

    /* Label colors */
    --label-red: #ff3b30;
    --label-orange: #ff9500;
    --label-yellow: #ffcc00;
    --label-green: #34c759;
    --label-teal: #5ac8fa;
    --label-blue: #007aff;
    --label-purple: #af52de;
    --label-pink: #ff2d55;
    --label-gray: #8e8e93;
  }

  body {
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    color: var(--text-primary);
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    padding: 56px 20px 12px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .inbox-icon {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .inbox-icon svg { width: 18px; height: 18px; }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .count-badge {
    font-size: 17px;
    font-weight: 400;
    color: var(--text-tertiary);
  }

  /* Filter bar */
  .filter-bar {
    padding: 4px 20px 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    background: var(--card);
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .filter-chip.active {
    background: var(--blue);
    color: white;
  }
  .filter-chip:active { opacity: 0.7; }
  .sort-chip.sort-active {
    background: #34c759;
    color: white;
  }

  /* Task list */
  .task-list {
    margin: 0 16px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    padding: 13px 16px;
    border-bottom: 1px solid var(--separator);
    gap: 12px;
    transition: background 0.1s;
    position: relative;
    cursor: pointer;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:active { background: #f2f2f7; }

  /* Color label strip */
  .color-strip {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 0;
  }
  .task-item.has-color { padding-left: 20px; }

  /* Checkbox */
  .checkbox {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--text-tertiary);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    cursor: pointer;
    background: transparent;
    position: relative;
    overflow: hidden;
  }
  .checkbox.checked {
    border-color: transparent;
    background: var(--text-tertiary);
  }
  .checkbox.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }

  /* Priority ring on checkbox */
  .checkbox.p-critical { border-color: var(--p-critical); }
  .checkbox.p-high { border-color: var(--p-high); }
  .checkbox.p-medium { border-color: var(--p-medium); }
  .checkbox.p-low { border-color: var(--p-low); }

  /* Task content */
  .task-content { flex: 1; min-width: 0; }

  .task-title {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text-primary);
    transition: all 0.3s;
  }
  .task-title.done {
    text-decoration: line-through;
    color: var(--text-tertiary);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .priority-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .priority-tag.critical { background: rgba(255,59,48,0.12); color: var(--p-critical); }
  .priority-tag.high { background: rgba(255,149,0,0.12); color: var(--p-high); }
  .priority-tag.medium { background: rgba(0,122,255,0.12); color: var(--p-medium); }
  .priority-tag.low { background: rgba(52,199,89,0.12); color: var(--p-low); }

  .note-text {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Drag handle */
  .drag-handle {
    width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: grab;
    opacity: 0.3;
    touch-action: none;
    margin-right: -10px;
    margin-left: -4px;
  }
  .drag-handle:active { cursor: grabbing; opacity: 0.7; }
  .drag-handle svg { width: 18px; height: 18px; pointer-events: none; }

  /* Dragging: the actual row becomes the card */
  .task-item.dragging {
    background: #eef2ff;
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.16), 0 2px 6px rgba(0,0,0,0.08);
    position: relative;
    z-index: 50;
    border-bottom: 1px solid transparent !important;
  }

  /* Siblings animate smoothly out of the way */
  .task-item.shifting {
    transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 32px;
    right: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,122,255,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(0,122,255,0.3); }
  .fab svg { width: 24px; height: 24px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    width: 100%;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 12px 20px 40px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 92dvh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--separator);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    display: block;
  }

  .form-input {
    width: 100%;
    font-size: 17px;
    font-family: inherit;
    border: none;
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-primary);
    outline: none;
    margin-bottom: 20px;
    resize: none;
    min-height: 44px;
  }
  .form-input::placeholder { color: var(--text-tertiary); }

  /* Priority selector */
  .priority-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .priority-btn {
    padding: 10px 4px;
    border: 2px solid var(--separator);
    border-radius: 10px;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text-secondary);
    transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .priority-btn .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .priority-btn.sel-critical { border-color: var(--p-critical); color: var(--p-critical); background: rgba(255,59,48,0.06); }
  .priority-btn.sel-high { border-color: var(--p-high); color: var(--p-high); background: rgba(255,149,0,0.06); }
  .priority-btn.sel-medium { border-color: var(--p-medium); color: var(--p-medium); background: rgba(0,122,255,0.06); }
  .priority-btn.sel-low { border-color: var(--p-low); color: var(--p-low); background: rgba(52,199,89,0.06); }

  /* Color picker */
  .color-picker {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .color-dot-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .color-dot-btn:active { transform: scale(0.88); }
  .color-dot-btn.selected { border-color: rgba(0,0,0,0.2); transform: scale(1.15); }
  .color-dot-btn.no-color {
    background: var(--bg);
    border-color: var(--separator) !important;
    color: var(--text-tertiary);
    font-size: 16px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
  }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--bg);
    font-size: 17px;
    font-family: inherit;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
  }
  .btn-save {
    flex: 2;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--blue);
    font-size: 17px;
    font-family: inherit;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:active { opacity: 0.8; }

  /* Context menu */
  .context-menu {
    position: fixed;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 300;
    overflow: hidden;
    min-width: 180px;
    display: none;
  }
  .context-menu.open { display: block; animation: popIn 0.15s ease; }
  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .context-item {
    padding: 13px 16px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--separator);
    color: var(--text-primary);
  }
  .context-item:last-child { border-bottom: none; }
  .context-item:active { background: var(--bg); }
  .context-item.danger { color: var(--p-critical); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-tertiary);
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Section headers for grouped view */
  .section-header {
    padding: 20px 20px 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Completed section */
  .completed-toggle {
    margin: 20px 16px 0;
    padding: 12px 16px;
    background: var(--card);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  .completed-toggle span {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .completed-toggle .chev {
    width: 20px; height: 20px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
  }
  .completed-toggle.expanded .chev { transform: rotate(90deg); }

  #completed-section { margin-top: 4px; }
  #completed-section .task-item .task-title { color: var(--text-tertiary); text-decoration: line-through; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="inbox-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
      </svg>
    </div>
    <h1>Inbox</h1>
  </div>
  <span class="count-badge" id="count-badge">0</span>
</div>

<div class="filter-bar">
  <button class="filter-chip active" data-filter="all">All</button>
  <button class="filter-chip" data-filter="critical">🔴 Critical</button>
  <button class="filter-chip" data-filter="high">🟠 High</button>
  <button class="filter-chip" data-filter="medium">🔵 Medium</button>
  <button class="filter-chip" data-filter="low">🟢 Low</button>
  <button class="filter-chip sort-chip" id="sort-btn" data-sort="manual">↕ Sort</button>
</div>

<div id="task-container"></div>

<div class="completed-toggle" id="completed-toggle" style="display:none">
  <span id="completed-label">Completed (0)</span>
  <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
</div>
<div id="completed-section" style="display:none"></div>

<button class="fab" id="fab-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">New Task</div>

    <label class="form-label">Task</label>
    <textarea class="form-input" id="task-input" rows="2" placeholder="What needs to be done?"></textarea>

    <label class="form-label">Note (optional)</label>
    <textarea class="form-input" id="note-input" rows="2" placeholder="Add a note…"></textarea>

    <label class="form-label">Priority</label>
    <div class="priority-selector">
      <button class="priority-btn" data-p="critical">
        <span class="dot" style="background:var(--p-critical)"></span>Critical
      </button>
      <button class="priority-btn" data-p="high">
        <span class="dot" style="background:var(--p-high)"></span>High
      </button>
      <button class="priority-btn" data-p="medium">
        <span class="dot" style="background:var(--p-medium)"></span>Medium
      </button>
      <button class="priority-btn" data-p="low">
        <span class="dot" style="background:var(--p-low)"></span>Low
      </button>
    </div>

    <label class="form-label">Color Label</label>
    <div class="color-picker" id="color-picker">
      <button class="color-dot-btn no-color selected" data-color="">✕</button>
      <button class="color-dot-btn" data-color="red" style="background:var(--label-red)"></button>
      <button class="color-dot-btn" data-color="orange" style="background:var(--label-orange)"></button>
      <button class="color-dot-btn" data-color="yellow" style="background:var(--label-yellow)"></button>
      <button class="color-dot-btn" data-color="green" style="background:var(--label-green)"></button>
      <button class="color-dot-btn" data-color="teal" style="background:var(--label-teal)"></button>
      <button class="color-dot-btn" data-color="blue" style="background:var(--label-blue)"></button>
      <button class="color-dot-btn" data-color="purple" style="background:var(--label-purple)"></button>
      <button class="color-dot-btn" data-color="pink" style="background:var(--label-pink)"></button>
      <button class="color-dot-btn" data-color="gray" style="background:var(--label-gray)"></button>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save Task</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="context-menu" id="context-menu">
  <div class="context-item" id="ctx-edit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </div>
  <div class="context-item danger" id="ctx-delete">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Delete
  </div>
</div>

<script>
const COLOR_MAP = {
  red: 'var(--label-red)', orange: 'var(--label-orange)',
  yellow: 'var(--label-yellow)', green: 'var(--label-green)',
  teal: 'var(--label-teal)', blue: 'var(--label-blue)',
  purple: 'var(--label-purple)', pink: 'var(--label-pink)',
  gray: 'var(--label-gray)'
};

let tasks = JSON.parse(localStorage.getItem('inbox-tasks') || '[]');
let activeFilter = 'all';
let sortMode = 'manual'; // 'manual' or 'priority'
let editingId = null;
let selectedPriority = '';
let selectedColor = '';
let contextTaskId = null;
let longPressTimer = null;

function save() {
  localStorage.setItem('inbox-tasks', JSON.stringify(tasks));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function renderAll() {
  const incomplete = tasks.filter(t => !t.done);
  const complete = tasks.filter(t => t.done);

  let filtered = incomplete;
  if (activeFilter !== 'all') {
    filtered = incomplete.filter(t => t.priority === activeFilter);
  }
  if (sortMode === 'priority' || activeFilter !== 'all') {
    const pOrder = { critical: 0, high: 1, medium: 2, low: 3, '': 4 };
    filtered = [...filtered].sort((a, b) => (pOrder[a.priority||''] ?? 4) - (pOrder[b.priority||''] ?? 4));
  }

  const container = document.getElementById('task-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="task-list" style="margin:0 16px"><div class="empty-state"><div class="big">&#10003;</div><p>' + (activeFilter !== 'all' ? 'No tasks with this priority' : 'Your inbox is clear') + '</p></div></div>';
  } else {
    container.innerHTML = '<div class="task-list" id="main-list">' + filtered.map(t => renderTask(t)).join('') + '</div>';
    attachTaskEvents(document.getElementById('main-list'));
  }

  document.getElementById('count-badge').textContent = incomplete.length || '';

  const toggle = document.getElementById('completed-toggle');
  const section = document.getElementById('completed-section');
  if (complete.length > 0) {
    toggle.style.display = 'flex';
    document.getElementById('completed-label').textContent = 'Completed (' + complete.length + ')';
    if (toggle.classList.contains('expanded')) {
      section.style.display = 'block';
      section.innerHTML = '<div class="task-list" style="margin:4px 16px 0">' + complete.map(t => renderTask(t)).join('') + '</div>';
      attachTaskEvents(section);
    }
  } else {
    toggle.style.display = 'none';
    section.style.display = 'none';
  }
}

const PRIORITY_COLOR_MAP = {
  critical: '#ff3b30',
  high: '#ff9500',
  medium: '#007aff',
  low: '#34c759'
};

function renderTask(t) {
  // Manual color label takes priority, otherwise fall back to priority color
  const stripColor = t.color ? COLOR_MAP[t.color] : (t.priority ? PRIORITY_COLOR_MAP[t.priority] : '');
  const colorStyle = stripColor ? ('style="background:' + stripColor + '"') : '';
  const hasColor = stripColor ? 'has-color' : '';
  const pClass = t.priority ? ('p-' + t.priority) : '';
  const doneClass = t.done ? 'checked' : '';

  let meta = '';
  if (t.priority) meta += '<span class="priority-tag ' + t.priority + '">' + t.priority + '</span>';
  if (t.note) meta += '<span class="note-text">' + escHtml(t.note) + '</span>';

  return '<div class="task-item ' + hasColor + '" data-id="' + t.id + '">'
    + (stripColor ? '<div class="color-strip" ' + colorStyle + '></div>' : '')
    + '<div class="checkbox ' + pClass + ' ' + doneClass + '" data-check="' + t.id + '"></div>'
    + '<div class="task-content">'
    + '<div class="task-title' + (t.done ? ' done' : '') + '">' + escHtml(t.title) + '</div>'
    + (meta ? '<div class="task-meta">' + meta + '</div>' : '')
    + '</div>'
    + '<div class="drag-handle" data-drag="' + t.id + '">'
    + '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="5.5" cy="4" r="1.3"/><circle cx="10.5" cy="4" r="1.3"/><circle cx="5.5" cy="8" r="1.3"/><circle cx="10.5" cy="8" r="1.3"/><circle cx="5.5" cy="12" r="1.3"/><circle cx="10.5" cy="12" r="1.3"/></svg>'
    + '</div>'
    + '</div>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function attachTaskEvents(container) {
  container.querySelectorAll('[data-check]').forEach(cb => {
    cb.addEventListener('click', e => {
      e.stopPropagation();
      const id = cb.dataset.check;
      const t = tasks.find(x => x.id === id);
      if (t) { t.done = !t.done; save(); renderAll(); }
    });
  });

  container.querySelectorAll('.task-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('[data-check]')) return;
      if (e.target.closest('[data-drag]')) return;
      if (isDragging) return;
      openEditModal(item.dataset.id);
    });

    item.addEventListener('contextmenu', e => {
      e.preventDefault();
      showContextMenu(e, item.dataset.id);
    });

    item.addEventListener('touchstart', e => {
      if (e.target.closest('[data-drag]')) return;
      longPressTimer = setTimeout(() => showContextMenu(e.touches[0], item.dataset.id), 600);
    }, { passive: true });
    item.addEventListener('touchend', () => clearTimeout(longPressTimer));
    item.addEventListener('touchmove', () => clearTimeout(longPressTimer));
  });

  container.querySelectorAll('[data-drag]').forEach(handle => {
    handle.addEventListener('mousedown', e => { e.preventDefault(); startDrag(e.clientX, e.clientY, handle.dataset.drag); });
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      e.stopPropagation();
      startDrag(e.touches[0].clientX, e.touches[0].clientY, handle.dataset.drag);
    }, { passive: false });
  });
}

// ====== DRAG & DROP ======
// Things-style: the actual row translates with your finger.
// Siblings above/below smoothly shift with CSS transitions.

let isDragging = false;
let dragId = null;
let dragEl = null;
let dragStartY = 0;
let dragCurrentY = 0;
let dragOffsetY = 0;
let itemHeights = [];  // cached heights of all items at drag start
let itemTops = [];     // cached top positions at drag start
let currentDropIndex = -1;
let originalIndex = -1;

function startDrag(clientX, clientY, id) {
  if (activeFilter !== 'all') return;

  const list = document.getElementById('main-list');
  if (!list) return;

  const el = list.querySelector('[data-id="' + id + '"]');
  if (!el) return;

  isDragging = true;
  dragId = id;
  dragEl = el;

  const rect = el.getBoundingClientRect();
  dragOffsetY = clientY - rect.top;
  dragStartY = clientY;
  dragCurrentY = clientY;

  // Cache all item positions/heights before we start transforming
  const allItems = [...list.querySelectorAll('.task-item')];
  originalIndex = allItems.indexOf(el);
  currentDropIndex = originalIndex;

  itemHeights = allItems.map(i => i.getBoundingClientRect().height);
  itemTops = allItems.map(i => i.getBoundingClientRect().top);

  // Add shifting class to siblings for smooth transitions
  allItems.forEach((item, i) => {
    if (item !== el) {
      item.classList.add('shifting');
      item.style.transform = '';
    }
  });

  // Style the dragged row as the lifted card
  el.classList.add('dragging');
  el.style.transition = 'none';
  el.style.transform = 'translateY(0px)';
  el.style.zIndex = '50';

  // Lock scroll
  document.body.style.overflow = 'hidden';
  document.body.style.touchAction = 'none';

  if (navigator.vibrate) navigator.vibrate(12);

  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMoveTouch, { passive: false });
  document.addEventListener('touchend', onDragEnd);
  document.addEventListener('touchcancel', onDragEnd);
}

function onDragMoveTouch(e) {
  if (!isDragging) return;
  e.preventDefault();
  e.stopPropagation();
  onDragMove({ clientY: e.touches[0].clientY });
}

function onDragMove(e) {
  if (!isDragging || !dragEl) return;

  dragCurrentY = e.clientY;
  const deltaY = dragCurrentY - dragStartY;

  // Move the dragged card
  dragEl.style.transform = 'translateY(' + deltaY + 'px)';

  // Figure out where in the list the dragged center is
  const draggedCenter = itemTops[originalIndex] + dragOffsetY + (deltaY);
  const list = document.getElementById('main-list');
  if (!list) return;
  const allItems = [...list.querySelectorAll('.task-item')];
  const dragHeight = itemHeights[originalIndex];

  let newDropIndex = originalIndex;
  for (let i = 0; i < allItems.length; i++) {
    if (allItems[i] === dragEl) continue;
    const top = itemTops[i];
    const mid = top + itemHeights[i] / 2;
    if (i < originalIndex && draggedCenter < mid) {
      newDropIndex = i;
      break;
    }
    if (i > originalIndex && draggedCenter + dragHeight > mid) {
      newDropIndex = i;
    }
  }

  if (newDropIndex === currentDropIndex) return;
  currentDropIndex = newDropIndex;

  // Shift siblings smoothly
  allItems.forEach((item, i) => {
    if (item === dragEl) return;
    let shift = 0;
    if (originalIndex < currentDropIndex) {
      // Moving down: items between original+1 and target shift up
      if (i > originalIndex && i <= currentDropIndex) shift = -dragHeight;
    } else {
      // Moving up: items between target and original-1 shift down
      if (i >= currentDropIndex && i < originalIndex) shift = dragHeight;
    }
    item.style.transform = 'translateY(' + shift + 'px)';
  });
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;

  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMoveTouch);
  document.removeEventListener('touchend', onDragEnd);
  document.removeEventListener('touchcancel', onDragEnd);

  document.body.style.overflow = '';
  document.body.style.touchAction = '';

  // Snap the dragged card to its final position with a quick animation
  const list = document.getElementById('main-list');
  const allItems = list ? [...list.querySelectorAll('.task-item')] : [];

  // Calculate exact pixel offset to final resting place
  let finalY = 0;
  if (currentDropIndex !== originalIndex) {
    if (currentDropIndex > originalIndex) {
      // Sum heights of items that shifted up
      for (let i = originalIndex + 1; i <= currentDropIndex; i++) {
        finalY += itemHeights[i];
      }
    } else {
      for (let i = currentDropIndex; i < originalIndex; i++) {
        finalY -= itemHeights[i];
      }
    }
  } else {
    finalY = 0;
  }

  // Animate card to final position, then re-render
  if (dragEl) {
    dragEl.style.transition = 'transform 0.15s cubic-bezier(0.25,0.46,0.45,0.94)';
    dragEl.style.transform = 'translateY(' + finalY + 'px)';
  }

  // Also animate siblings back to zero offset (they're already there, just ensure clean state)
  allItems.forEach(item => {
    if (item !== dragEl) {
      item.style.transition = 'transform 0.15s cubic-bezier(0.25,0.46,0.45,0.94)';
    }
  });

  setTimeout(() => {
    // Clean up inline styles
    allItems.forEach(item => {
      item.classList.remove('dragging', 'shifting');
      item.style.transform = '';
      item.style.transition = '';
      item.style.zIndex = '';
    });

    // Reorder tasks data
    if (currentDropIndex !== originalIndex) {
      const complete = tasks.filter(t => t.done);
      const incomplete = tasks.filter(t => !t.done);

      // Get display order from DOM ids
      const domIds = allItems.map(el => el.dataset.id);
      const ordered = domIds.map(id => incomplete.find(t => t.id === id)).filter(Boolean);

      // Move dragged task
      const [moved] = ordered.splice(originalIndex, 1);
      ordered.splice(currentDropIndex, 0, moved);

      tasks = [...ordered, ...complete];
      save();
    }

    renderAll();

    dragId = null;
    dragEl = null;
    currentDropIndex = -1;
    originalIndex = -1;
  }, 160);
}

// Modal
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('task-input').value = '';
  document.getElementById('note-input').value = '';
  selectedPriority = '';
  selectedColor = '';
  updatePriorityUI();
  updateColorUI();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('task-input').focus(), 300);
}

function openEditModal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('task-input').value = t.title;
  document.getElementById('note-input').value = t.note || '';
  selectedPriority = t.priority || '';
  selectedColor = t.color || '';
  updatePriorityUI();
  updateColorUI();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function saveTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) { document.getElementById('task-input').focus(); return; }
  const note = document.getElementById('note-input').value.trim();

  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    if (t) { t.title = title; t.note = note; t.priority = selectedPriority; t.color = selectedColor; }
  } else {
    tasks.unshift({ id: genId(), title, note, priority: selectedPriority, color: selectedColor, done: false });
  }
  save();
  renderAll();
  closeModal();
}

function updatePriorityUI() {
  document.querySelectorAll('.priority-btn').forEach(btn => {
    const p = btn.dataset.p;
    btn.className = 'priority-btn' + (selectedPriority === p ? (' sel-' + p) : '');
  });
}

function updateColorUI() {
  document.querySelectorAll('.color-dot-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.color === selectedColor);
  });
}

function showContextMenu(e, id) {
  contextTaskId = id;
  const menu = document.getElementById('context-menu');
  menu.classList.add('open');
  const x = Math.min((e.clientX || e.pageX), window.innerWidth - 200);
  const y = Math.min((e.clientY || e.pageY), window.innerHeight - 100);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

function hideContextMenu() {
  document.getElementById('context-menu').classList.remove('open');
  contextTaskId = null;
}

document.getElementById('fab-btn').addEventListener('click', openAddModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveTask);

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.querySelectorAll('.priority-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedPriority = selectedPriority === btn.dataset.p ? '' : btn.dataset.p;
    updatePriorityUI();
  });
});

document.querySelectorAll('.color-dot-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedColor = btn.dataset.color;
    updateColorUI();
  });
});

document.querySelectorAll('.filter-chip:not(.sort-chip)').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip:not(.sort-chip)').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    renderAll();
  });
});

document.getElementById('sort-btn').addEventListener('click', () => {
  const btn = document.getElementById('sort-btn');
  if (sortMode === 'manual') {
    sortMode = 'priority';
    btn.textContent = '↕ Priority';
    btn.classList.add('sort-active');
  } else {
    sortMode = 'manual';
    btn.textContent = '↕ Sort';
    btn.classList.remove('sort-active');
  }
  renderAll();
});

document.getElementById('ctx-edit').addEventListener('click', () => {
  const id = contextTaskId;
  hideContextMenu();
  openEditModal(id);
});

document.getElementById('ctx-delete').addEventListener('click', () => {
  tasks = tasks.filter(t => t.id !== contextTaskId);
  save(); renderAll(); hideContextMenu();
});

document.addEventListener('click', e => {
  if (!e.target.closest('#context-menu')) hideContextMenu();
});

document.getElementById('completed-toggle').addEventListener('click', function() {
  this.classList.toggle('expanded');
  const section = document.getElementById('completed-section');
  if (this.classList.contains('expanded')) {
    section.style.display = 'block';
    const complete = tasks.filter(t => t.done);
    section.innerHTML = '<div class="task-list" style="margin:4px 16px 0">' + complete.map(t => renderTask(t)).join('') + '</div>';
    attachTaskEvents(section);
  } else {
    section.style.display = 'none';
  }
});

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveTask(); }
});

if (tasks.length === 0) {
  tasks = [
    { id: genId(), title: 'Item 1', note: '', priority: 'critical', color: '', done: false },
    { id: genId(), title: 'Item 2', note: '', priority: 'high', color: '', done: false },
    { id: genId(), title: 'Item 3', note: '', priority: 'medium', color: '', done: false },
    { id: genId(), title: 'Item 4', note: '', priority: 'low', color: '', done: false },
  ];
  save();
}

renderAll();
</script>
